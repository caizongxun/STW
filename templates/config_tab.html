<!-- 設定 Tab 內容 -->
<div class="tab-content" id="config-tab">
    <div class="card">
        <div class="card-loading" id="configCardLoading">
            <div>
                <div class="spinner"></div>
                <div class="card-loading-text">處理中...</div>
            </div>
        </div>
        
        <h3>系統設定</h3>
        
        <div class="info-banner">
            <ul>
                <li>配置 AI 模型參數</li>
                <li>設定 API 金鑰（加密存儲）</li>
                <li>本地持久化，關閉後配置仍保留</li>
                <li>支持匯出/匯入配置</li>
            </ul>
        </div>
        
        <h4 style="margin-top: 24px;">AI 設定</h4>
        <div class="grid-2">
            <div class="form-group">
                <label>模型</label>
                <select id="aiModel" class="form-control">
                    <option value="deepseek-r1:14b">DeepSeek-R1 14B</option>
                    <option value="deepseek-r1:7b">DeepSeek-R1 7B</option>
                    <option value="deepseek-r1:32b">DeepSeek-R1 32B</option>
                </select>
            </div>
            <div class="form-group">
                <label>Temperature</label>
                <input type="number" id="aiTemperature" class="form-control" value="0.1" min="0" max="1" step="0.1">
            </div>
            <div class="form-group">
                <label>Max Tokens</label>
                <input type="number" id="aiMaxTokens" class="form-control" value="2048" min="512" max="4096" step="256">
            </div>
            <div class="form-group">
                <label>信心度門檢</label>
                <input type="number" id="aiConfidenceThreshold" class="form-control" value="70" min="50" max="95">
            </div>
        </div>
        
        <h4 style="margin-top: 24px;">多模型集成設定</h4>
        <div class="grid-3">
            <div class="form-group">
                <label>啟用集成決策</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="enableEnsemble">
                    <label for="enableEnsemble"></label>
                </div>
            </div>
            <div class="form-group">
                <label>最少模型數</label>
                <input type="number" id="minModels" class="form-control" value="2" min="1" max="5">
            </div>
            <div class="form-group">
                <label>最多模型數</label>
                <input type="number" id="maxModels" class="form-control" value="3" min="1" max="5">
            </div>
        </div>
        
        <h4 style="margin-top: 24px;">免費 API 設定</h4>
        <div class="info-banner" style="background: #e3f2fd; border-left: 4px solid #2196F3;">
            <p>所有 API Keys 加密存儲，關閉系統後仍保留。首次輸入後會顯示掩碼，無需每次重輸。</p>
        </div>
        
        <div class="grid-2">
            <div class="form-group">
                <label>Groq API Key (速度最快)</label>
                <input type="password" id="groqApiKey" class="form-control" placeholder="輸入 Groq API Key">
                <small class="form-text">注冊: https://console.groq.com</small>
            </div>
            <div class="form-group">
                <label>Google Gemini API Key (推理最強)</label>
                <input type="password" id="googleApiKey" class="form-control" placeholder="輸入 Google API Key">
                <small class="form-text">注冊: https://aistudio.google.com</small>
            </div>
            <div class="form-group">
                <label>OpenRouter API Key (多模型)</label>
                <input type="password" id="openrouterApiKey" class="form-control" placeholder="輸入 OpenRouter Key">
                <small class="form-text">注冊: https://openrouter.ai</small>
            </div>
            <div class="form-group">
                <label>GitHub Token (選填)</label>
                <input type="password" id="githubToken" class="form-control" placeholder="輸入 GitHub Token">
                <small class="form-text">用於 GitHub Models</small>
            </div>
            <div class="form-group">
                <label>Cloudflare API Key (選填)</label>
                <input type="password" id="cloudflareApiKey" class="form-control" placeholder="輸入 Cloudflare Key">
                <small class="form-text">高额度免費 API</small>
            </div>
        </div>
        
        <h4 style="margin-top: 24px;">其他 API 設定</h4>
        <div class="grid-2">
            <div class="form-group">
                <label>DeepSeek API Key (選填)</label>
                <input type="password" id="deepseekApiKey" class="form-control" placeholder="選填">
            </div>
            <div class="form-group">
                <label>Binance API Key (選填)</label>
                <input type="password" id="binanceApiKey" class="form-control" placeholder="選填">
            </div>
        </div>
        
        <div class="button-group" style="margin-top: 24px;">
            <button id="saveConfigBtn" class="btn btn-primary">保存設定</button>
            <button id="testApisBtn" class="btn btn-success">測試 API 連接</button>
            <button id="resetConfigBtn" class="btn btn-warning">重設設定</button>
            <button id="exportConfigBtn" class="btn btn-secondary">匯出配置</button>
            <button id="importConfigBtn" class="btn btn-secondary">匯入配置</button>
        </div>
        
        <div id="configStatus"></div>
        
        <h4 style="margin-top: 24px;">API 使用統計</h4>
        <div id="apiStats"></div>
        
        <h4 style="margin-top: 24px;">通知設定</h4>
        <div class="form-group">
            <label>啟用通知</label>
            <div class="toggle-switch">
                <input type="checkbox" id="enableNotifications">
                <label for="enableNotifications"></label>
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>通知信箱</label>
                <input type="email" id="notificationEmail" class="form-control" placeholder="your@email.com">
            </div>
        </div>
        <div class="grid-2">
            <div class="form-group">
                <label>交易通知</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="notifyOnTrade">
                    <label for="notifyOnTrade"></label>
                </div>
            </div>
            <div class="form-group">
                <label>錯誤通知</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="notifyOnError">
                    <label for="notifyOnError"></label>
                </div>
            </div>
        </div>
    </div>
</div>
