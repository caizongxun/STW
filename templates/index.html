<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[V13] DeepSeek-R1 AI 交易決策系統</title>
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/model_selector.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/floating_chat.css') }}">
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
</head>
<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <h2>STW AI</h2>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-tab="signal">
                    <span>實時訊號 & 回測</span>
                </button>
                <button class="nav-item" data-tab="auto">
                    <span>自動更新</span>
                </button>
                <button class="nav-item" data-tab="bybit">
                    <span>Bybit Demo</span>
                </button>
                <button class="nav-item" data-tab="ai-log">
                    <span>AI 預測記錄</span>
                </button>
                <button class="nav-item" data-tab="cases">
                    <span>學習案例庫</span>
                </button>
                <button class="nav-item" data-tab="config">
                    <span>設定</span>
                </button>
            </nav>
            
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot" id="wsStatus"></span>
                    <span id="wsStatusText">連接中...</span>
                </div>
            </div>
        </aside>
        
        <main class="main-content">
            <header class="header">
                <h1>[V13] DeepSeek-R1 AI 交易決策系統</h1>
                <div class="header-info">
                    <span id="currentTime"></span>
                </div>
            </header>
            
            <!-- 實時訊號 & 回測 -->
            <div class="tab-content active" id="signal-tab">
                <div class="info-banner">
                    <h3>V13 核心特色</h3>
                    <ul>
                        <li>DeepSeek-R1 14B 本地推理引擎</li>
                        <li>Chain-of-Thought 多步驟推理</li>
                        <li>從歷史成功交易中學習 (40+ 技術指標)</li>
                        <li>即時更新、無頁面重新載入</li>
                    </ul>
                </div>
                
                <div class="grid-2">
                    <div class="card">
                        <div class="card-loading" id="signalCardLoading">
                            <div>
                                <div class="spinner"></div>
                                <div class="card-loading-text">處理中...</div>
                            </div>
                        </div>
                        
                        <h3>設定</h3>
                        
                        <div class="form-group">
                            <label>交易對</label>
                            <select id="symbolSelect" class="form-control">
                                <option value="BTCUSDT">BTCUSDT</option>
                                <option value="ETHUSDT">ETHUSDT</option>
                                <option value="SOLUSDT">SOLUSDT</option>
                                <option value="BNBUSDT">BNBUSDT</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>K 線周期</label>
                            <select id="timeframeSelect" class="form-control">
                                <option value="15m" selected>15m</option>
                                <option value="1h">1h</option>
                                <option value="4h">4h</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>起投本金 (USDT)</label>
                            <input type="number" id="capitalInput" class="form-control" value="10000" min="1000" step="1000">
                        </div>
                        
                        <div class="form-group">
                            <label>回測天數</label>
                            <input type="number" id="daysInput" class="form-control" value="30" min="7" max="90">
                        </div>
                        
                        <div class="form-group">
                            <label>AI 最低信心門檢 (%)</label>
                            <input type="range" id="confidenceSlider" class="form-range" min="50" max="95" value="70" step="5">
                            <span id="confidenceValue">70%</span>
                        </div>
                        
                        <div class="button-group">
                            <button id="analyzeBtn" class="btn btn-primary">
                                獲取實時訊號
                            </button>
                            <button id="backtestBtn" class="btn btn-success">
                                開始回測
                            </button>
                        </div>
                    </div>
                    
                    <div class="card">
                        <div class="card-loading" id="resultCardLoading">
                            <div>
                                <div class="spinner"></div>
                                <div class="card-loading-text">處理中...</div>
                            </div>
                        </div>
                        
                        <h3 id="signalTitle">實時 AI 訊號</h3>
                        <div id="signalContent" class="signal-content">
                            <p class="text-muted">點擊「獲取實時訊號」開始分析</p>
                        </div>
                    </div>
                </div>
                
                <div id="backtestResults" class="card" style="display: none;">
                    <div class="card-loading" id="backtestCardLoading">
                        <div>
                            <div class="spinner"></div>
                            <div class="card-loading-text">處理中...</div>
                        </div>
                    </div>
                    
                    <h3>回測結果</h3>
                    <div id="backtestContent"></div>
                </div>
            </div>
            
            <!-- 其他 Tab 內容省略... -->
            <!-- ... -->
            
        </main>
    </div>
    
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <p id="loadingText">處理中...</p>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ai_log.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bybit.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auto_update.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cases.js') }}"></script>
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/arbitrator_ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/model_selector.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ai_chat.js') }}"></script>
    
    <!-- 懸浮球聊天室 -->
    <script src="{{ url_for('static', filename='js/floating_chat.js') }}"></script>
</body>
</html>
